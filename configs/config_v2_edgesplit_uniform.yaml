# =============================================================================
# Companion to config_v2_edgesplit.yaml: same held-out edge split, but UNIFORM
# negatives instead of degree-matched ones. Exists for one reason -- to isolate the
# cost of an honest split from the cost of honest negatives. Scoring the hard-negative
# checkpoint against uniform negatives conflates the two, because that model was trained
# to ignore gene degree and can no longer exploit it (job 5606: 0.5533, a train/eval
# mismatch, not a difficulty measure). Training and evaluation must agree.
# =============================================================================

project:
  name: mirna_ms_v2_edgesplit_uniform
  seed: 42
  output_dir: /raid/home/umoya/scripts/microRNA_project/results

data:
  raw_dir:       /raid/home/umoya/scripts/microRNA_project/data/raw
  processed_dir: /raid/home/umoya/scripts/microRNA_project/data/processed
  graphs_dir:    /raid/home/umoya/scripts/microRNA_project/data/graphs

  cellxgene:
    organism: "Homo sapiens"
    disease:  "multiple sclerosis"
    tissue:
      - "blood"
      - "brain"
      - "cerebrospinal fluid"
    n_top_genes: 3000
    min_cells:   3
    min_genes:   200
    max_pct_mito: 20.0
    max_obs_ms:   150000
    max_obs_ctrl: 100000

  mirna:
    mirdb_url: "https://mirdb.org/download/miRDB_v6.0_prediction_result.txt.gz"
    mirdb_score_threshold: 80
    min_interactions: 5

  geo:
    accessions:
      GSE289530: "miRNA CD14+ monocytes, CD8+ T cells, neutrophils; MS vs HC (GPL19117, 166 samples, 2026)"

  graph:
    coexpression_threshold:          0.60
    coexpression_top_n_genes:        1000
    cell_gene_expression_threshold:  0.10
    min_mirna_gene_interactions:     2

cell_type_markers:
  T_cell:        ["CD3D", "CD3E", "CD3G"]
  CD4_T:         ["CD4", "IL7R"]
  CD8_T:         ["CD8A", "CD8B"]
  Th17:          ["IL17A", "RORC", "IL23R", "CCR6"]
  Treg:          ["FOXP3", "IL2RA", "CTLA4"]
  B_cell:        ["MS4A1", "CD19", "CD79A"]
  NK_cell:       ["GNLY", "NKG7", "NCAM1"]
  Monocyte:      ["CD14", "LYZ", "CST3"]
  Microglia:     ["CX3CR1", "P2RY12", "TMEM119", "SLC2A5"]
  Oligodendrocyte: ["MBP", "PLP1", "MOG", "CNP"]
  Astrocyte:     ["GFAP", "S100B", "AQP4", "ALDH1L1"]

model:
  hidden_channels: 512        # wider: 256→512
  num_heads:       8
  num_layers:      4          # deeper: 3→4
  dropout:         0.3        # more regularization: 0.2→0.3
  mirna_init_dim:  64

training:
  batch_size:   512
  num_epochs:   200
  lr:           5.0e-4        # slower: 1e-3→5e-4
  weight_decay: 1.0e-5
  patience:     25            # more patience for slower lr
  loss_reconstruction_weight: 1.0
  loss_classification_weight: 0.5
  loss_sparsity_weight:       0.01
  val_ratio:    0.10
  test_ratio:   0.10
  num_neighbors: [10, 5]

  # Edge-level split: val_ratio/test_ratio above also govern the miRNA→gene edge
  # holdout. disjoint_train_ratio further splits the training edges so the ones
  # used as supervision targets are not also fed to the encoder.
  disjoint_train_ratio: 0.3
  hard_negatives: false         # uniform negatives, to isolate the split's effect

  checkpoint_dir: /raid/home/umoya/scripts/microRNA_project/checkpoints_v2_edgesplit_uniform
  log_dir:        /raid/home/umoya/scripts/microRNA_project/logs

slurm:
  partition:    dgx_large
  nodelist:     dgxa100jal
  gpus_train:   4
  cpus_per_task: 16
  mem:          128gb
  conda_env:    mirna_ms
  conda_init:   /shared/apps/Python/Tensorflow/3.11.6/etc/profile.d/conda.sh

# The transductive ("edges seen in training, uniform negatives") reference row for
# THIS graph — the miRDB v6.0 build. eval_heldout_grid.py subtracts the held-out
# numbers from these to attribute the collapse; it used to carry them hardcoded, which
# meant pointing it at any other interaction source produced an attribution against a
# graph the run had nothing to do with. Declared here so the numbers travel with the
# graph that owns them, and so a config without this block simply gets no attribution.
#
# CAVEAT (goal.md §3.2, still open): these are n=1, hardcoded from the original
# single-seed run at training/eval_heldout_grid.py before this move, and NOT
# recomputable today — train.py builds the edge split unconditionally and the leaky
# path was deleted in 8a12ce3. Do not report them with an error bar.
evaluation:
  reference_seen_edges:
    uniform:        0.9836
    degree_matched: 0.8828
