# =============================================================================
# v3fixed TRANSDUCTIVE + uniform negatives — the "edges seen in training" reference,
# re-measured on the fixed graph. Identical to config_v3fixed_edgesplit.yaml except:
#   training.edge_split:    false   (no holdout — the encoder sees every miRNA→gene
#                                     edge and the head is supervised on the same edges;
#                                     the leak, reintroduced deliberately behind the flag)
#   training.hard_negatives: false  (uniform negatives, as the original 0.9836 used)
#   checkpoint_dir / project.name   (its own outputs)
#
# GATE: this is the correctness check before the full 16-run fan-out. The seen×uniform
# cell should land near the original 0.9836, confirming the transductive leak reproduces
# on the fixed graph with clean, consistent negative machinery. It will NOT be
# bit-identical (the original also had a since-fixed negative-exclusion bug), but ~0.98
# confirms the protocol. Graph is shared: data/graphs_v3fixed (built by job 5717).
# =============================================================================

project:
  name: mirna_ms_v3fixed_transductive_uniform_s777
  seed: 777
  output_dir: /raid/home/umoya/scripts/microRNA_project/results

data:
  raw_dir:       /raid/home/umoya/scripts/microRNA_project/data/raw
  processed_dir: /raid/home/umoya/scripts/microRNA_project/data/processed
  graphs_dir:    /raid/home/umoya/scripts/microRNA_project/data/graphs_v3fixed

  cellxgene:
    organism: "Homo sapiens"
    disease:  "multiple sclerosis"
    tissue:
      - "blood"
      - "brain"
      - "cerebrospinal fluid"
    n_top_genes: 3000
    min_cells:   3
    min_genes:   200
    max_pct_mito: 20.0
    max_obs_ms:   150000
    max_obs_ctrl: 100000

  mirna:
    mirdb_url: "https://mirdb.org/download/miRDB_v6.0_prediction_result.txt.gz"
    mirdb_score_threshold: 80
    min_interactions: 5

  geo:
    accessions:
      GSE289530: "miRNA microarray (GPL19117); lymphocytes, monocytes, neutrophils; mixed cohort per Sample_description (Control/MS/T1D), 166 samples, 2026. NOTE: not used downstream (mirna_expr.tsv has zero readers)."

  graph:
    coexpression_threshold:          0.60
    coexpression_top_n_genes:        1000
    cell_gene_expression_threshold:  0.10
    min_mirna_gene_interactions:     2

cell_type_markers:
  T_cell:        ["CD3D", "CD3E", "CD3G"]
  CD4_T:         ["CD4", "IL7R"]
  CD8_T:         ["CD8A", "CD8B"]
  Th17:          ["IL17A", "RORC", "IL23R", "CCR6"]
  Treg:          ["FOXP3", "IL2RA", "CTLA4"]
  B_cell:        ["MS4A1", "CD19", "CD79A"]
  NK_cell:       ["GNLY", "NKG7", "NCAM1"]
  Monocyte:      ["CD14", "LYZ", "CST3"]
  Microglia:     ["CX3CR1", "P2RY12", "TMEM119", "SLC2A5"]
  Oligodendrocyte: ["MBP", "PLP1", "MOG", "CNP"]
  Astrocyte:     ["GFAP", "S100B", "AQP4", "ALDH1L1"]

model:
  hidden_channels: 512
  num_heads:       8
  num_layers:      4
  dropout:         0.3
  mirna_init_dim:  64

training:
  batch_size:   512
  num_epochs:   200
  lr:           5.0e-4
  weight_decay: 1.0e-5
  patience:     25
  loss_reconstruction_weight: 1.0
  loss_classification_weight: 0.5
  loss_sparsity_weight:       0.01
  val_ratio:    0.10
  test_ratio:   0.10
  num_neighbors: [10, 5]

  disjoint_train_ratio: 0.3
  edge_split:     false         # TRANSDUCTIVE: no holdout, the leak on purpose
  hard_negatives: false         # uniform negatives (the original 0.9836 protocol)

  checkpoint_dir: /raid/home/umoya/scripts/microRNA_project/checkpoints_v3fixed_transductive_uniform_s777
  log_dir:        /raid/home/umoya/scripts/microRNA_project/logs

slurm:
  partition:    dgx_large
  nodelist:     dgxa100jal
  gpus_train:   4
  cpus_per_task: 16
  mem:          128gb
  conda_env:    mirna_ms
  conda_init:   /shared/apps/Python/Tensorflow/3.11.6/etc/profile.d/conda.sh
