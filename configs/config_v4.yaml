# =============================================================================
# Hyperparameter variant v4: Compact model, heavier weight decay, balanced loss
# Changes vs baseline:
#   hidden_channels 256→128, num_layers 3→2, num_heads 8→4,
#   weight_decay 1e-5→1e-4, loss_classification_weight 0.5→0.75,
#   loss_sparsity_weight 0.01→0.05
# =============================================================================

project:
  name: mirna_ms_v4
  seed: 123               # different seed for diversity
  output_dir: /raid/home/umoya/scripts/microRNA_project/results

data:
  raw_dir:       /raid/home/umoya/scripts/microRNA_project/data/raw
  processed_dir: /raid/home/umoya/scripts/microRNA_project/data/processed
  graphs_dir:    /raid/home/umoya/scripts/microRNA_project/data/graphs

  cellxgene:
    organism: "Homo sapiens"
    disease:  "multiple sclerosis"
    tissue:
      - "blood"
      - "brain"
      - "cerebrospinal fluid"
    n_top_genes: 3000
    min_cells:   3
    min_genes:   200
    max_pct_mito: 20.0
    max_obs_ms:   150000
    max_obs_ctrl: 100000

  mirna:
    mirdb_url: "https://mirdb.org/download/miRDB_v6.0_prediction_result.txt.gz"
    mirdb_score_threshold: 80
    min_interactions: 5

  geo:
    accessions:
      GSE289530: "miRNA CD14+ monocytes, CD8+ T cells, neutrophils; MS vs HC (GPL19117, 166 samples, 2026)"

  graph:
    coexpression_threshold:          0.60
    coexpression_top_n_genes:        1000
    cell_gene_expression_threshold:  0.10
    min_mirna_gene_interactions:     2

cell_type_markers:
  T_cell:        ["CD3D", "CD3E", "CD3G"]
  CD4_T:         ["CD4", "IL7R"]
  CD8_T:         ["CD8A", "CD8B"]
  Th17:          ["IL17A", "RORC", "IL23R", "CCR6"]
  Treg:          ["FOXP3", "IL2RA", "CTLA4"]
  B_cell:        ["MS4A1", "CD19", "CD79A"]
  NK_cell:       ["GNLY", "NKG7", "NCAM1"]
  Monocyte:      ["CD14", "LYZ", "CST3"]
  Microglia:     ["CX3CR1", "P2RY12", "TMEM119", "SLC2A5"]
  Oligodendrocyte: ["MBP", "PLP1", "MOG", "CNP"]
  Astrocyte:     ["GFAP", "S100B", "AQP4", "ALDH1L1"]

model:
  hidden_channels: 128        # compact: 256→128
  num_heads:       4          # fewer heads: 8→4
  num_layers:      2          # shallower: 3→2
  dropout:         0.2
  mirna_init_dim:  64

training:
  batch_size:   512
  num_epochs:   200
  lr:           1.0e-3
  weight_decay: 1.0e-4        # stronger decay: 1e-5→1e-4
  patience:     20
  loss_reconstruction_weight: 1.0
  loss_classification_weight: 0.75  # balanced: 0.5→0.75
  loss_sparsity_weight:       0.05   # stronger sparsity: 0.01→0.05
  val_ratio:    0.10
  test_ratio:   0.10
  num_neighbors: [10, 5]
  checkpoint_dir: /raid/home/umoya/scripts/microRNA_project/checkpoints_v4
  log_dir:        /raid/home/umoya/scripts/microRNA_project/logs

slurm:
  partition:    dgx_large
  nodelist:     dgxa100jal
  gpus_train:   4
  cpus_per_task: 16
  mem:          128gb
  conda_env:    mirna_ms
  conda_init:   /shared/apps/Python/Tensorflow/3.11.6/etc/profile.d/conda.sh
