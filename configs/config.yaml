# =============================================================================
# Central configuration for miRNA-MS project
# =============================================================================

project:
  name: mirna_ms
  seed: 42
  output_dir: /raid/home/umoya/scripts/microRNA_project/results

data:
  raw_dir:       /raid/home/umoya/scripts/microRNA_project/data/raw
  processed_dir: /raid/home/umoya/scripts/microRNA_project/data/processed
  graphs_dir:    /raid/home/umoya/scripts/microRNA_project/data/graphs

  cellxgene:
    organism: "Homo sapiens"   # resolved automatically to 'homo_sapiens' in download script
    disease:  "multiple sclerosis"
    tissue:
      - "blood"
      - "brain"
      - "cerebrospinal fluid"
    n_top_genes: 3000       # highly variable genes kept after HVG selection
    min_cells:   3
    min_genes:   200
    max_pct_mito: 20.0
    max_obs_ms:   150000    # cap to avoid OOM on download; null = no cap
    max_obs_ctrl: 100000

  mirna:
    mirdb_url: "https://mirdb.org/download/miRDB_v6.0_prediction_result.txt.gz"
    mirdb_score_threshold: 80   # 0-100; >=80 is high-confidence
    min_interactions: 5         # minimum interactions to keep a miRNA node in graph

  geo:
    accessions:
      GSE289530: "miRNA CD14+ monocytes, CD8+ T cells, neutrophils; MS vs HC (GPL19117, 166 samples, 2026)"

  graph:
    coexpression_threshold:          0.60   # PCC threshold for gene-gene edges
    coexpression_top_n_genes:        1000   # genes used for co-expr computation
    cell_gene_expression_threshold:  0.10   # log-normalized expression threshold
    min_mirna_gene_interactions:     2      # min validated edges to keep a miRNA node

# Cell-type marker genes used for Leiden cluster annotation
cell_type_markers:
  T_cell:        ["CD3D", "CD3E", "CD3G"]
  CD4_T:         ["CD4", "IL7R"]
  CD8_T:         ["CD8A", "CD8B"]
  Th17:          ["IL17A", "RORC", "IL23R", "CCR6"]
  Treg:          ["FOXP3", "IL2RA", "CTLA4"]
  B_cell:        ["MS4A1", "CD19", "CD79A"]
  NK_cell:       ["GNLY", "NKG7", "NCAM1"]
  Monocyte:      ["CD14", "LYZ", "CST3"]
  Microglia:     ["CX3CR1", "P2RY12", "TMEM119", "SLC2A5"]
  Oligodendrocyte: ["MBP", "PLP1", "MOG", "CNP"]
  Astrocyte:     ["GFAP", "S100B", "AQP4", "ALDH1L1"]

model:
  hidden_channels: 256
  num_heads:       8
  num_layers:      3
  dropout:         0.2
  mirna_init_dim:  64    # random init embedding dim for miRNA nodes

training:
  batch_size:   512
  num_epochs:   200
  lr:           1.0e-3
  weight_decay: 1.0e-5
  patience:     20       # early stopping patience (epochs without val improvement)
  loss_reconstruction_weight: 1.0
  loss_classification_weight: 0.5
  loss_sparsity_weight:       0.01
  val_ratio:    0.10
  test_ratio:   0.10
  num_neighbors: [10, 5]   # NeighborLoader sampling per HGT layer
  checkpoint_dir: /raid/home/umoya/scripts/microRNA_project/checkpoints
  log_dir:        /raid/home/umoya/scripts/microRNA_project/logs

slurm:
  partition:    dgx_large
  nodelist:     dgxa100jal
  gpus_train:   4
  cpus_per_task: 16
  mem:          128gb
  conda_env:    mirna_ms
  conda_init:   /shared/apps/Python/Tensorflow/3.11.6/etc/profile.d/conda.sh
